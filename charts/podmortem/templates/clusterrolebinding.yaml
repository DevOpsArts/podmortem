{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "podmortem.fullname" . }}-reader-binding
  labels:
    {{- include "podmortem.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "podmortem.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "podmortem.fullname" . }}-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
